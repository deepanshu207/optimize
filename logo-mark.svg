<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Swag Stree Optimizer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Camera / image icon -->
  <rect x="10" y="14" width="28" height="22" rx="3" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <circle cx="24" cy="25" r="6" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <circle cx="24" cy="25" r="2.5" fill="#FFD700"/>
  <rect x="19" y="10" width="10" height="6" rx="2" fill="url(#gold)"/>
  <!-- star/sparkle -->
  <circle cx="36" cy="18" r="1.5" fill="#FFD700"/>
</svg>
