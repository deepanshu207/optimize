<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Meesho Shipping Cost Optimizer</title>
  <link rel="icon" href="/icons/icon32.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }
    .topbar {
      background: linear-gradient(135deg, #FFD700, #C9A227);
      padding: 16px 20px;
      text-align: center;
    }
    .topbar h1 { font-size: 20px; font-weight: 700; }
    .topbar p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 12px 12px 32px; }
    #optimizer-app {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
      overflow: hidden;
    }
    #optimizer-app .opt-close { display: none; }
    .api-note {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Meesho Shipping Cost Optimizer</h1>
    <p>Upload image → AI creates variations → finds lowest shipping</p>
  </div>

  <div class="wrap">
    <div id="optimizer-app"></div>
    <p class="api-note">Variations generate in your browser. Live Meesho shipping prices are checked automatically when API is reachable.</p>
  </div>

  <script src="web-shim.js"></script>
  <script src="config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/license.js"></script>
  <script src="js/meeshoApi.js"></script>
  <script src="js/imageGenerator.js"></script>
  <script src="js/ui.js"></script>
  <script src="content.js"></script>
  <script src="web-optimizer.js"></script>
</body>
</html>
